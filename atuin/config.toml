style = "full"
inline_height = 0

show_help = false
show_tabs = false
sync_frequency = "10m"

history_filter = [
  "^ls$",
  "^ls ",
  "^la$",
  "^la ",
  "^lsr$",
  "^lsr ",
  "^cd$",
  "^cd ",
  "^c$",
  "^c ",
]

search_mode = "daemon-fuzzy"

[daemon]
enabled = true
autostart = true

[sync]
records = true

[stats]
common_prefix = ["sudo ","doas "]
